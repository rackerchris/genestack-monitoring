groups:
- name: node-exporter
  rules:
  - alert: node-filesystem-almost-out-of-space-warning
    expr: >-
      ( node_filesystem_avail_bytes{job="node-exporter",fstype!="",mountpoint!=""} / node_filesystem_size_bytes{job="node-exporter",fstype!="",mountpoint!=""} * 100 < 3

      and node_filesystem_readonly{job="node-exporter",fstype!="",mountpoint!=""} == 0 )
    for: 30m
    labels:
      severity: warning
      group_name: node-filesystem-almost-out-of-space
      node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
    annotations:
      description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available space left.
      runbook_url: default_runbook_url
      summary: Filesystem has less than 3% space left.
      dashboard_url: default_dashboard_url
  - alert: node-filesystem-almost-out-of-space-critical
    expr: >-
      ( node_filesystem_avail_bytes{job="node-exporter",fstype!="",mountpoint!=""} / node_filesystem_size_bytes{job="node-exporter",fstype!="",mountpoint!=""} * 100 < 3

      and node_filesystem_readonly{job="node-exporter",fstype!="",mountpoint!=""} == 0 )
    for: 30m
    labels:
      severity: critical
      group_name: node-filesystem-almost-out-of-space
      node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
    annotations:
      description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available space left.
      runbook_url: default_runbook_url
      summary: Filesystem has less than 3% space left.
      dashboard_url: default_dashboard_url
