groups:
- name: node-exporter
  rules:
  - alert: node-network-transmit-errs-warning
    expr: >-
      rate(node_network_transmit_errs_total{job="node-exporter"}[2m]) /

      rate(node_network_transmit_packets_total{job="node-exporter"}[2m]) > 0.01
    for: 1h
    labels:
      severity: warning
      group_name: node-network-transmit-errs
      node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
    annotations:
      description: '{{ $labels.instance }} interface {{ $labels.device }} has encountered {{ printf "%.0f" $value }} transmit errors in the last two minutes.'
      runbook_url: default_runbook_url
      summary: Network interface is reporting many transmit errors.
      dashboard_url: default_dashboard_url
  - alert: node-network-transmit-errs-critical
    expr: >-
      rate(node_network_transmit_errs_total{job="node-exporter"}[2m]) /

      rate(node_network_transmit_packets_total{job="node-exporter"}[2m]) > 0.01
    for: 1h
    labels:
      severity: critical
      group_name: node-network-transmit-errs
      node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
    annotations:
      description: '{{ $labels.instance }} interface {{ $labels.device }} has encountered {{ printf "%.0f" $value }} transmit errors in the last two minutes.'
      runbook_url: default_runbook_url
      summary: Network interface is reporting many transmit errors.
      dashboard_url: default_dashboard_url
