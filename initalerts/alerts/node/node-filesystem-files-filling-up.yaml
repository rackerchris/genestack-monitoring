groups:
- name: node-exporter
  rules:
  - alert: node-filesystem-files-filling-up-warning
    expr: >-
      ( node_filesystem_files_free{job="node-exporter",fstype!="",mountpoint!=""} / node_filesystem_files{job="node-exporter",fstype!="",mountpoint!=""} * 100 < 20

      and predict_linear(node_filesystem_files_free{job="node-exporter",fstype!="",mountpoint!=""}[6h], 4*60*60) < 0

      and node_filesystem_readonly{job="node-exporter",fstype!="",mountpoint!=""} == 0 )
    for: 1h
    labels:
      severity: warning
      group_name: node-filesystem-files-filling-up
      node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
    annotations:
      description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available inodes left and is filling up fast.
      runbook_url: default_runbook_url
      summary: Filesystem is predicted to run out of inodes within the next 4 hours.
      dashboard_url: default_dashboard_url
  - alert: node-filesystem-files-filling-up-critical
    expr: >-
      ( node_filesystem_files_free{job="node-exporter",fstype!="",mountpoint!=""} / node_filesystem_files{job="node-exporter",fstype!="",mountpoint!=""} * 100 < 20

      and predict_linear(node_filesystem_files_free{job="node-exporter",fstype!="",mountpoint!=""}[6h], 4*60*60) < 0

      and node_filesystem_readonly{job="node-exporter",fstype!="",mountpoint!=""} == 0 )
    for: 1h
    labels:
      severity: critical
      group_name: node-filesystem-files-filling-up
      node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
    annotations:
      description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available inodes left and is filling up fast.
      runbook_url: default_runbook_url
      summary: Filesystem is predicted to run out of inodes within the next 4 hours.
      dashboard_url: default_dashboard_url
