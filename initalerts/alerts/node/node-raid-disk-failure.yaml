groups:
  - name: node-exporter
    rules:
      - alert: node-raid-disk-failure-warning
        expr: >-
          node_md_disks{state="failed",job="node-exporter",device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}

          > 0
        for: 0m
        labels:
          severity: warning
          group_name: node-raid-disk-failure
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: At least one device in RAID array at {{ $labels.instance }} failed. Array '{{ $labels.device }}' needs attention and possibly a disk swap.
          runbook_url: default_runbook_url
          summary: Failed device in RAID array.
          dashboard_url: default_dashboard_url
      - alert: node-raid-disk-failure-critical
        expr: >-
          node_md_disks{state="failed",job="node-exporter",device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}

          > 0
        for: 0m
        labels:
          severity: critical
          group_name: node-raid-disk-failure
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: At least one device in RAID array at {{ $labels.instance }} failed. Array '{{ $labels.device }}' needs attention and possibly a disk swap.
          runbook_url: default_runbook_url
          summary: Failed device in RAID array.
          dashboard_url: default_dashboard_url
