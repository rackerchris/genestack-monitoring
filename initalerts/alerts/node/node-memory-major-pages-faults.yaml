groups:
- name: node-exporter
  rules:
  - alert: node-memory-major-pages-faults-warning
    expr: rate(node_vmstat_pgmajfault{job="node-exporter"}[5m]) > 500
    for: 15m
    labels:
      severity: warning
      group_name: node-memory-major-pages-faults
      node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
    annotations:
      description: 'Memory major pages are occurring at very high rate at {{ $labels.instance }}, 500 major page faults per second for the last 15 minutes, is currently at {{ printf "%.2f" $value }}.

        Please check that there is enough memory available at this instance.

        '
      runbook_url: default_runbook_url
      summary: Memory major page faults are occurring at very high rate.
      dashboard_url: default_dashboard_url
  - alert: node-memory-major-pages-faults-critical
    expr: rate(node_vmstat_pgmajfault{job="node-exporter"}[5m]) > 500
    for: 15m
    labels:
      severity: critical
      group_name: node-memory-major-pages-faults
      node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
    annotations:
      description: 'Memory major pages are occurring at very high rate at {{ $labels.instance }}, 500 major page faults per second for the last 15 minutes, is currently at {{ printf "%.2f" $value }}.

        Please check that there is enough memory available at this instance.

        '
      runbook_url: default_runbook_url
      summary: Memory major page faults are occurring at very high rate.
      dashboard_url: default_dashboard_url
