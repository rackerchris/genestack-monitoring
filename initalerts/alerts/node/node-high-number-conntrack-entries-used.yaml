groups:
  - name: node-exporter
    rules:
      - alert: node-high-number-conntrack-entries-used-warning
        expr: (node_nf_conntrack_entries{job="node-exporter"} / node_nf_conntrack_entries_limit) > 0.75
        for: 0m
        labels:
          severity: warning
          group_name: node-high-number-conntrack-entries-used
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: "{{ $labels.instance }} {{ $value | humanizePercentage }} of conntrack entries are used."
          runbook_url: default_runbook_url
          summary: Number of conntrack are getting close to the limit.
          dashboard_url: default_dashboard_url
      - alert: node-high-number-conntrack-entries-used-critical
        expr: (node_nf_conntrack_entries{job="node-exporter"} / node_nf_conntrack_entries_limit) > 0.75
        for: 0m
        labels:
          severity: critical
          group_name: node-high-number-conntrack-entries-used
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: "{{ $labels.instance }} {{ $value | humanizePercentage }} of conntrack entries are used."
          runbook_url: default_runbook_url
          summary: Number of conntrack are getting close to the limit.
          dashboard_url: default_dashboard_url
