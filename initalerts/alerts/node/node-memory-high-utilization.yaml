groups:
  - name: node-exporter
    rules:
      - alert: node-memory-high-utilization-warning
        expr: 100 - (node_memory_MemAvailable_bytes{job="node-exporter"} / node_memory_MemTotal_bytes{job="node-exporter"} * 100) > 70
        for: 15m
        labels:
          severity: warning
          group_name: node-memory-high-utilization
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Memory usage on {{ $labels.node_hostname }} has been above 70% for 15m; current usage is {{ printf "%.2f" $value }}%.
          runbook_url: https://docs.rackspacecloud.com/alerting-info/
          summary: Host memory utilization is high.
          dashboard_url: https://{{ $externalLabels.alert_dashboard }}/node-memory ?var-cluster={{ $externalLabels.cluster }} &var-node={{ $labels.node_hostname }}
      - alert: node-memory-high-utilization-critical
        expr: 100 - (node_memory_MemAvailable_bytes{job="node-exporter"} / node_memory_MemTotal_bytes{job="node-exporter"} * 100) > 90
        for: 15m
        labels:
          severity: critical
          group_name: node-memory-high-utilization
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Memory usage on {{ $labels.node_hostname }} has been above 90% for 15m; current usage is {{ printf "%.2f" $value }}%.
          runbook_url: https://docs.rackspacecloud.com/alerting-info/
          summary: Host is running out of memory.
          dashboard_url: https://{{ $externalLabels.alert_dashboard }}/node-memory ?var-cluster={{ $externalLabels.cluster }} &var-node={{ $labels.node_hostname }}
