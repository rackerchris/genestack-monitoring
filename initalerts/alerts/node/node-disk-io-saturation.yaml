groups:
  - name: node-exporter
    rules:
      - alert: node-disk-io-saturation-warning
        expr: >-
          rate(node_disk_io_time_weighted_seconds_total{job="node-exporter",
          device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}[5m]) > 10
        for: 15m
        labels:
          severity: warning
          group_name: node-disk-io-saturation
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description:
            'Disk IO queue (aqu-sq) is high on {{ $labels.device }} at {{ $labels.instance }}, has been above 10 for the last 15 minutes, is currently at {{ printf "%.2f" $value }}.

            This symptom might indicate disk saturation.

            '
          runbook_url: default_runbook_url
          summary: Disk IO queue is high.
          dashboard_url: default_dashboard_url
      - alert: node-disk-io-saturation-critical
        expr: >-
          rate(node_disk_io_time_weighted_seconds_total{job="node-exporter",

          device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}[5m]) > 10
        for: 30m
        labels:
          severity: critical
          group_name: node-disk-io-saturation
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description:
            'Disk IO queue (aqu-sq) is high on {{ $labels.device }} at {{ $labels.instance }}, has been above 10 for the last 30 minutes, is currently at {{ printf "%.2f" $value }}.

            This symptom might indicate disk saturation.

            '
          runbook_url: default_runbook_url
          summary: Disk IO queue is high.
          dashboard_url: default_dashboard_url
