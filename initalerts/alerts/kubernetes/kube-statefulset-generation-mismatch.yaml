groups:
  - name: kubernetes
    rules:
      - alert: kube-statefulset-generation-mismatch-warning
        expr: >-
          kube_statefulset_status_observed_generation{job="kube-state-metrics", namespace=~".*"} != kube_statefulset_metadata_generation{job="kube-state-metrics", namespace=~".*"}
        for: 15m
        labels:
          severity: warning
          group_name: kube-statefulset-generation-mismatch
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: StatefulSet generation for {{ $labels.namespace }}/{{ $labels.statefulset }} does not match, this indicates that the StatefulSet has failed but has not been rolled back on cluster {{ $labels.cluster }}.
          runbook_url: default_runbook_url
          summary: StatefulSet generation mismatch due to possible roll-back
          dashboard_url: default_dashboard_url
      - alert: kube-statefulset-generation-mismatch-critical
        expr: >-
          kube_statefulset_status_observed_generation{job="kube-state-metrics", namespace=~".*"} != kube_statefulset_metadata_generation{job="kube-state-metrics", namespace=~".*"}
        for: 15m
        labels:
          severity: critical
          group_name: kube-statefulset-generation-mismatch
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: StatefulSet generation for {{ $labels.namespace }}/{{ $labels.statefulset }} does not match, this indicates that the StatefulSet has failed but has not been rolled back on cluster {{ $labels.cluster }}.
          runbook_url: default_runbook_url
          summary: StatefulSet generation mismatch due to possible roll-back
          dashboard_url: default_dashboard_url
