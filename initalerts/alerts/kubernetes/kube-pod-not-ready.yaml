groups:
- name: kubernetes
  rules:
  - alert: kube-pod-not-ready-warning
    expr: >-
      sum by (namespace, pod, cluster) ( max by (namespace, pod, cluster) ( kube_pod_status_phase{job="kube-state-metrics", namespace=~".*", phase=~"Pending|Unknown|Failed"} ) * on (namespace, pod, cluster) group_left(owner_kind) topk by (namespace, pod, cluster) ( 1, max by (namespace, pod, owner_kind, cluster) (kube_pod_owner{owner_kind!="Job"}) ) ) > 0
    for: 15m
    labels:
      severity: warning
      group_name: kube-pod-not-ready
      node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
    annotations:
      description: Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in a non-ready state for longer than 15 minutes on cluster {{ $labels.cluster }}.
      runbook_url: default_runbook_url
      summary: Pod has been in a non-ready state for more than 15 minutes.
      dashboard_url: default_dashboard_url
  - alert: kube-pod-not-ready-critical
    expr: >-
      sum by (namespace, pod, cluster) ( max by (namespace, pod, cluster) ( kube_pod_status_phase{job="kube-state-metrics", namespace=~".*", phase=~"Pending|Unknown|Failed"} ) * on (namespace, pod, cluster) group_left(owner_kind) topk by (namespace, pod, cluster) ( 1, max by (namespace, pod, owner_kind, cluster) (kube_pod_owner{owner_kind!="Job"}) ) ) > 0
    for: 15m
    labels:
      severity: critical
      group_name: kube-pod-not-ready
      node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
    annotations:
      description: Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in a non-ready state for longer than 15 minutes on cluster {{ $labels.cluster }}.
      runbook_url: default_runbook_url
      summary: Pod has been in a non-ready state for more than 15 minutes.
      dashboard_url: default_dashboard_url
