groups:
- name: kubernetes
  rules:
  - alert: kube-daemonset-not-scheduled-warning
    expr: >-
      kube_daemonset_status_desired_number_scheduled{job="kube-state-metrics", namespace=~".*"} - kube_daemonset_status_current_number_scheduled{job="kube-state-metrics", namespace=~".*"} > 0
    for: 10m
    labels:
      severity: warning
      group_name: kube-daemonset-not-scheduled
      node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
    annotations:
      description: '{{ $value }} Pods of DaemonSet {{ $labels.namespace }}/{{ $labels.daemonset }} are not scheduled on cluster {{ $labels.cluster }}.'
      runbook_url: default_runbook_url
      summary: DaemonSet pods are not scheduled.
      dashboard_url: default_dashboard_url
  - alert: kube-daemonset-not-scheduled-critical
    expr: >-
      kube_daemonset_status_desired_number_scheduled{job="kube-state-metrics", namespace=~".*"} - kube_daemonset_status_current_number_scheduled{job="kube-state-metrics", namespace=~".*"} > 0
    for: 10m
    labels:
      severity: critical
      group_name: kube-daemonset-not-scheduled
      node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
    annotations:
      description: '{{ $value }} Pods of DaemonSet {{ $labels.namespace }}/{{ $labels.daemonset }} are not scheduled on cluster {{ $labels.cluster }}.'
      runbook_url: default_runbook_url
      summary: DaemonSet pods are not scheduled.
      dashboard_url: default_dashboard_url
