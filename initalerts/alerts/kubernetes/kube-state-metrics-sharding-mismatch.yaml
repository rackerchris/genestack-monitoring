groups:
- name: kubernetes
  rules:
  - alert: kube-state-metrics-sharding-mismatch-warning
    expr: stdvar (kube_state_metrics_total_shards{job="kube-state-metrics"}) by (cluster) != 0
    for: 15m
    labels:
      severity: warning
      group_name: kube-state-metrics-sharding-mismatch
      node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
    annotations:
      description: kube-state-metrics pods are running with different --total-shards configuration, some Kubernetes objects may be exposed multiple times or not exposed at all.
      runbook_url: default_runbook_url
      summary: kube-state-metrics sharding is misconfigured.
      dashboard_url: default_dashboard_url
  - alert: kube-state-metrics-sharding-mismatch-critical
    expr: stdvar (kube_state_metrics_total_shards{job="kube-state-metrics"}) by (cluster) != 0
    for: 15m
    labels:
      severity: critical
      group_name: kube-state-metrics-sharding-mismatch
      node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
    annotations:
      description: kube-state-metrics pods are running with different --total-shards configuration, some Kubernetes objects may be exposed multiple times or not exposed at all.
      runbook_url: default_runbook_url
      summary: kube-state-metrics sharding is misconfigured.
      dashboard_url: default_dashboard_url
