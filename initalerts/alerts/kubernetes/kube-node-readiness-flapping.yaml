groups:
  - name: kubernetes
    rules:
      - alert: kube-node-readiness-flapping-warning
        expr: >-
          sum(changes(kube_node_status_condition{job="kube-state-metrics",status="true",condition="Ready"}[15m])) by (cluster, node) > 2

          and on (cluster, node) kube_node_spec_unschedulable{job="kube-state-metrics"} == 0
        for: 15m
        labels:
          severity: warning
          group_name: kube-node-readiness-flapping
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: The readiness status of node {{ $labels.node }} has changed {{ $value }} times in the last 15 minutes on cluster {{ $labels.cluster }}.
          runbook_url: default_runbook_url
          summary: Node readiness status is flapping.
          dashboard_url: default_dashboard_url
      - alert: kube-node-readiness-flapping-critical
        expr: >-
          sum(changes(kube_node_status_condition{job="kube-state-metrics",status="true",condition="Ready"}[15m])) by (cluster, node) > 2

          and on (cluster, node) kube_node_spec_unschedulable{job="kube-state-metrics"} == 0
        for: 15m
        labels:
          severity: critical
          group_name: kube-node-readiness-flapping
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: The readiness status of node {{ $labels.node }} has changed {{ $value }} times in the last 15 minutes on cluster {{ $labels.cluster }}.
          runbook_url: default_runbook_url
          summary: Node readiness status is flapping.
          dashboard_url: default_dashboard_url
