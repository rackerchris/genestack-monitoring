groups:
  - name: kubernetes
    rules:
      - alert: kube-pod-crash-looping-warning
        expr: >-
          max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff", job="kube-state-metrics", namespace=~".*"}[5m]) >= 1
        for: 15m
        labels:
          severity: warning
          group_name: kube-pod-crash-looping
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: 'Pod {{ $labels.namespace }}/{{ $labels.pod }} ({{ $labels.container }}) is in waiting state (reason: "CrashLoopBackOff") on cluster {{ $labels.cluster }}.'
          runbook_url: default_runbook_url
          summary: Pod is crash looping.
          dashboard_url: default_dashboard_url
      - alert: kube-pod-crash-looping-critical
        expr: >-
          max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff", job="kube-state-metrics", namespace=~".*"}[5m]) >= 1
        for: 15m
        labels:
          severity: critical
          group_name: kube-pod-crash-looping
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: 'Pod {{ $labels.namespace }}/{{ $labels.pod }} ({{ $labels.container }}) is in waiting state (reason: "CrashLoopBackOff") on cluster {{ $labels.cluster }}.'
          runbook_url: default_runbook_url
          summary: Pod is crash looping.
          dashboard_url: default_dashboard_url
