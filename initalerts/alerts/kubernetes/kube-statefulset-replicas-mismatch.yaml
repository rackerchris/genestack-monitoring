groups:
  - name: kubernetes
    rules:
      - alert: kube-statefulset-replicas-mismatch-warning
        expr: >-
          ( kube_statefulset_status_replicas_ready{job="kube-state-metrics", namespace=~".*"} != kube_statefulset_replicas{job="kube-state-metrics", namespace=~".*"} )

          and ( changes(kube_statefulset_status_replicas_updated{job="kube-state-metrics", namespace=~".*"}[10m]) == 0 )
        for: 15m
        labels:
          severity: warning
          group_name: kube-statefulset-replicas-mismatch
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} has not matched the expected number of replicas for longer than 15 minutes on cluster {{ $labels.cluster }}.
          runbook_url: default_runbook_url
          summary: StatefulSet has not matched the expected number of replicas.
          dashboard_url: default_dashboard_url
      - alert: kube-statefulset-replicas-mismatch-critical
        expr: >-
          ( kube_statefulset_status_replicas_ready{job="kube-state-metrics", namespace=~".*"} != kube_statefulset_replicas{job="kube-state-metrics", namespace=~".*"} )

          and ( changes(kube_statefulset_status_replicas_updated{job="kube-state-metrics", namespace=~".*"}[10m]) == 0 )
        for: 15m
        labels:
          severity: critical
          group_name: kube-statefulset-replicas-mismatch
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} has not matched the expected number of replicas for longer than 15 minutes on cluster {{ $labels.cluster }}.
          runbook_url: default_runbook_url
          summary: StatefulSet has not matched the expected number of replicas.
          dashboard_url: default_dashboard_url
