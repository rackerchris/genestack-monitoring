additionalPrometheusRulesMap:
  mariadb-restarted:
    groups:
      - name: mariadb-restarted
        rules:
          - alert: mariadb-restarted-warning
            expr: mysql_global_status_uptime < 60
            for: 0m
            labels:
              severity: warning
              group_name: mariadb-restarted
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: >-
                MariaDB on {{ $labels.instance }} has just restarted within the last minute.
              runbook_url: default_runbook_url
              summary: MariaDB has just restarted.
              dashboard_url: default_dashboard_url
          - alert: mariadb-restarted-critical
            expr: mysql_global_status_uptime < 60
            for: 5m
            labels:
              severity: critical
              group_name: mariadb-restarted
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: >-
                MariaDB restart signal on {{ $labels.instance }} has persisted for 5 minutes and needs
                investigation.
              runbook_url: default_runbook_url
              summary: MariaDB restart signal has persisted unexpectedly.
              dashboard_url: default_dashboard_url
