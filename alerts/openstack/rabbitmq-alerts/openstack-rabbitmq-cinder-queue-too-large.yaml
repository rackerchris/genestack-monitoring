additionalPrometheusRulesMap:
  openstack-rabbitmq-cinder-queue-too-large:
    groups:
    - name: openstack-rabbitmq-cinder-queue-too-large
      rules:
      - alert: openstack-rabbitmq-cinder-queue-too-large-warning
        expr: rabbitmq_queue_messages{vhost="cinder"} > 25
        for: 10m
        labels:
          severity: warning
          group_name: openstack-rabbitmq-cinder-queue-too-large
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Cinder vhost in RabbitMQ has too many messages. Check consumers. This warning alert fires after
            10m.
          runbook_url: default_runbook_url
          summary: Cinder vhost has too many messages
          dashboard_url: default_dashboard_url
      - alert: openstack-rabbitmq-cinder-queue-too-large-critical
        expr: rabbitmq_queue_messages{vhost="cinder"} > 25
        for: 15m
        labels:
          severity: critical
          group_name: openstack-rabbitmq-cinder-queue-too-large
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Cinder vhost in RabbitMQ has too many messages. Check consumers. This critical alert fires after
            15m.
          runbook_url: default_runbook_url
          summary: Cinder vhost has too many messages
          dashboard_url: default_dashboard_url
