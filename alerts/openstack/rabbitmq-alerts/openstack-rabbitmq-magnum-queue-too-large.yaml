additionalPrometheusRulesMap:
  openstack-rabbitmq-magnum-queue-too-large:
    groups:
    - name: openstack-rabbitmq-magnum-queue-too-large
      rules:
      - alert: openstack-rabbitmq-magnum-queue-too-large-warning
        expr: rabbitmq_queue_messages{vhost="magnum"} > 25
        for: 10m
        labels:
          severity: warning
          group_name: openstack-rabbitmq-magnum-queue-too-large
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Magnum vhost in RabbitMQ has too many messages. Check consumers. This warning alert fires after
            10m.
          runbook_url: default_runbook_url
          summary: Magnum vhost has too many messages
          dashboard_url: default_dashboard_url
      - alert: openstack-rabbitmq-magnum-queue-too-large-critical
        expr: rabbitmq_queue_messages{vhost="magnum"} > 25
        for: 10m
        labels:
          severity: critical
          group_name: openstack-rabbitmq-magnum-queue-too-large
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Magnum vhost in RabbitMQ has too many messages. Check consumers. This critical alert fires after 10m.
          runbook_url: default_runbook_url
          summary: Magnum vhost has too many messages
          dashboard_url: default_dashboard_url
