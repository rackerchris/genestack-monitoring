additionalPrometheusRulesMap:
  openstack-api-tls-certificate-expiring:
    groups:
    - name: openstack-api-tls-certificate-expiring
      rules:
      - alert: openstack-api-tls-certificate-expiring-warning
        expr: (httpcheck_tls_cert_remaining_seconds - time()) / 86400 < 25
        for: 5m
        labels:
          severity: warning
          group_name: openstack-api-tls-certificate-expiring
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            SSL certificate expires within 15 days. This warning alert fires immediately.
          runbook_url: default_runbook_url
          summary: SSL certificate will expire soon on (instance {{ $labels.http_url }})
          dashboard_url: default_dashboard_url
      - alert: openstack-api-tls-certificate-expiring-critical
        expr: (httpcheck_tls_cert_remaining_seconds - time()) / 86400 < 7
        for: 5m
        labels:
          severity: critical
          group_name: openstack-api-tls-certificate-expiring
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            SSL certificate expires within 15 days. This critical alert fires after 5m.
          runbook_url: default_runbook_url
          summary: SSL certificate will expire soon on (instance {{ $labels.http_url }})
          dashboard_url: default_dashboard_url
