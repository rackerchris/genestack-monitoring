additionalPrometheusRulesMap:
  kube-statefulset-replicas-mismatch:
    groups:
      - name: kube-statefulset-replicas-mismatch
        rules:
          - alert: kube-statefulset-replicas-mismatch-warning
            expr: >-
              ( kube_statefulset_status_replicas_ready{namespace=~".*"} != kube_statefulset_replicas{namespace=~".*"} )

              and ( changes(kube_statefulset_status_replicas_updated{namespace=~".*"}[10m]) == 0 )
            for: 5m
            labels:
              severity: warning
              group_name: kube-statefulset-replicas-mismatch
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: >-
                StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} has not matched the expected
                number of replicas for longer than 5 minutes.
              runbook_url: default_runbook_url
              summary: StatefulSet has not matched the expected number of replicas.
              dashboard_url: default_dashboard_url
          - alert: kube-statefulset-replicas-mismatch-critical
            expr: >-
              ( kube_statefulset_status_replicas_ready{namespace=~".*"} != kube_statefulset_replicas{namespace=~".*"} )

              and ( changes(kube_statefulset_status_replicas_updated{namespace=~".*"}[10m]) == 0 )
            for: 10m
            labels:
              severity: critical
              group_name: kube-statefulset-replicas-mismatch
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: >-
                StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} has not matched the expected
                number of replicas for longer than 10 minutes.
              runbook_url: default_runbook_url
              summary: StatefulSet has not matched the expected number of replicas.
              dashboard_url: default_dashboard_url
