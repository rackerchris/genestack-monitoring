additionalPrometheusRulesMap:
  kube-client-certificate-expiration:
    groups:
      - name: kube-client-certificate-expiration
        rules:
          - alert: kube-client-certificate-expiration-warning
            expr: >-
              histogram_quantile(0.01, sum without (namespace, service, endpoint) (rate(apiserver_client_certificate_expiration_seconds_bucket{job="apiserver"}[5m]))) < 2419200

              and on (job, instance) apiserver_client_certificate_expiration_seconds_count{job="apiserver"} > 0
            for: 5m
            labels:
              severity: warning
              group_name: kube-client-certificate-expiration
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: >-
                A client certificate used to authenticate to kubernetes apiserver is expiring in less than 28
                days. This warning alert fires after 5m.
              runbook_url: default_runbook_url
              summary: Client certificate is about to expire.
              dashboard_url: default_dashboard_url
          - alert: kube-client-certificate-expiration-critical
            expr: >-
              histogram_quantile(0.01, sum without (namespace, service, endpoint) (rate(apiserver_client_certificate_expiration_seconds_bucket{job="apiserver"}[5m]))) < 1209600

              and on (job, instance) apiserver_client_certificate_expiration_seconds_count{job="apiserver"} > 0
            for: 10m
            labels:
              severity: critical
              group_name: kube-client-certificate-expiration
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: >-
                A client certificate used to authenticate to kubernetes apiserver is expiring in less than 14
                days. This critical alert fires after 10m.
              runbook_url: default_runbook_url
              summary: Client certificate is about to expire.
              dashboard_url: default_dashboard_url
