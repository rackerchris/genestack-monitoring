additionalPrometheusRulesMap:
  kubelet-server-certificate-expiration:
    groups:
      - name: kubelet-server-certificate-expiration
        rules:
          - alert: kubelet-server-certificate-expiration-warning
            expr: kubelet_certificate_manager_server_ttl_seconds < 2419200
            for: 5m
            labels:
              severity: warning
              group_name: kubelet-server-certificate-expiration
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: >-
                Server certificate for Kubelet on node {{ $labels.node }} expires in {{ $value |
                humanizeDuration }}. This warning alert fires after 5m.
              runbook_url: default_runbook_url
              summary: Kubelet server certificate is about to expire.
              dashboard_url: default_dashboard_url
          - alert: kubelet-server-certificate-expiration-critical
            expr: kubelet_certificate_manager_server_ttl_seconds < 1209600
            for: 10m
            labels:
              severity: critical
              group_name: kubelet-server-certificate-expiration
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: >-
                Server certificate for Kubelet on node {{ $labels.node }} expires in {{ $value |
                humanizeDuration }}. This critical alert fires after 10m.
              runbook_url: default_runbook_url
              summary: Kubelet server certificate is about to expire.
              dashboard_url: default_dashboard_url
