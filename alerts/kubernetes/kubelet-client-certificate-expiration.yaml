additionalPrometheusRulesMap:
  kubelet-client-certificate-expiration:
    groups:
      - name: kubelet-client-certificate-expiration
        rules:
          - alert: kubelet-client-certificate-expiration-warning
            expr: kubelet_certificate_manager_client_ttl_seconds < 2419200
            for: 5m
            labels:
              severity: warning
              group_name: kubelet-client-certificate-expiration
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: >-
                Client certificate for Kubelet on node {{ $labels.node }} expires in {{ $value |
                humanizeDuration }} on cluster {{ $labels.cluster }}. This warning alert fires after 5m.
              runbook_url: default_runbook_url
              summary: Kubelet client certificate will expire in less than 28 days.
              dashboard_url: default_dashboard_url
          - alert: kubelet-client-certificate-expiration-critical
            expr: kubelet_certificate_manager_client_ttl_seconds < 1209600
            for: 10m
            labels:
              severity: critical
              group_name: kubelet-client-certificate-expiration
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: >-
                Client certificate for Kubelet on node {{ $labels.node }} expires in {{ $value |
                humanizeDuration }}. This critical alert fires after 10m.
              runbook_url: default_runbook_url
              summary: Kubelet client certificate will expire in less than 14 days.
              dashboard_url: default_dashboard_url
