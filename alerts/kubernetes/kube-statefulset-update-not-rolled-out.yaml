additionalPrometheusRulesMap:
  kube-statefulset-update-not-rolled-out:
    groups:
      - name: kube-statefulset-update-not-rolled-out
        rules:
          - alert: kube-statefulset-update-not-rolled-out-warning
            expr: >-
              ( max by (namespace, statefulset, job) ( kube_statefulset_status_current_revision{job="kube-state-metrics", namespace=~".*"}

              unless kube_statefulset_status_update_revision{job="kube-state-metrics", namespace=~".*"} ) *

              on (namespace, statefulset) ( kube_statefulset_replicas{namespace=~".*"} != kube_statefulset_status_replicas_updated{namespace=~".*"} ) )

              and on (namespace, statefulset) ( changes(kube_statefulset_status_replicas_updated{namespace=~".*"}[5m]) == 0 )
            for: 5m
            labels:
              severity: warning
              group_name: kube-statefulset-update-not-rolled-out
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: >-
                StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} update has not been rolled out on
                cluster {{ $labels.cluster }}. This warning alert fires after 5m.
              runbook_url: default_runbook_url
              summary: StatefulSet update has not been rolled out.
              dashboard_url: default_dashboard_url
          - alert: kube-statefulset-update-not-rolled-out-critical
            expr: >-
              ( max by (namespace, statefulset, job) ( kube_statefulset_status_current_revision{job="kube-state-metrics", namespace=~".*"}

              unless kube_statefulset_status_update_revision{job="kube-state-metrics", namespace=~".*"} ) *

              on (namespace, statefulset) ( kube_statefulset_replicas{namespace=~".*"} != kube_statefulset_status_replicas_updated{namespace=~".*"} ) )

              and on (namespace, statefulset) ( changes(kube_statefulset_status_replicas_updated{namespace=~".*"}[5m]) == 0 )
            for: 10m
            labels:
              severity: critical
              group_name: kube-statefulset-update-not-rolled-out
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: >-
                StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} update has not been rolled out on
                cluster {{ $labels.cluster }}. This critical alert fires after 10m.
              runbook_url: default_runbook_url
              summary: StatefulSet update has not been rolled out.
              dashboard_url: default_dashboard_url
