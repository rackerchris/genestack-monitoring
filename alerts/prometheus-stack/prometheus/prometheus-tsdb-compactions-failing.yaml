additionalPrometheusRulesMap:
  prometheus-tsdb-compactions-failing:
    groups:
    - name: prometheus-tsdb-compactions-failing
      rules:
      - alert: prometheus-tsdb-compactions-failing-warning
        expr: increase(prometheus_tsdb_compactions_failed_total[3h]) >= 1
        for: 15m
        labels:
          severity: warning
          group_name: prometheus-tsdb-compactions-failing
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus {{$labels.namespace}}/{{$labels.pod}} has detected {{$value | humanize}} compaction
            failures over the last 3h.
          runbook_url: default_runbook_url
          summary: Prometheus has issues compacting blocks.
          dashboard_url: default_dashboard_url
      - alert: prometheus-tsdb-compactions-failing-critical
        expr: increase(prometheus_tsdb_compactions_failed_total[3h]) >= 2
        for: 20m
        labels:
          severity: critical
          group_name: prometheus-tsdb-compactions-failing
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus {{$labels.namespace}}/{{$labels.pod}} has detected {{$value | humanize}} compaction
            failures over the last 3h.
          runbook_url: default_runbook_url
          summary: Prometheus has issues compacting blocks.
          dashboard_url: default_dashboard_url
