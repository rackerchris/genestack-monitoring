additionalPrometheusRulesMap:
  alertmanager-failed-reload:
    groups:
    - name: alertmanager-failed-reload
      rules:
      - alert: alertmanager-failed-reload-warning
        expr: '# Without max_over_time, failed scrapes could create false negatives, see

          # https://www.robustperception.io/alerting-on-gauges-in-prometheus-2-0 for details.

          max_over_time(alertmanager_config_last_reload_successful{job="kube-prometheus-stack-alertmanager",container="alertmanager",namespace="prometheus"}[5m]) == 0'
        for: 10m
        labels:
          severity: warning
          group_name: alertmanager-failed-reload
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Configuration has failed to load for {{ $labels.namespace }}/{{ $labels.pod}}. This warning
            alert fires after 10m.
          runbook_url: default_runbook_url
          summary: Reloading an Alertmanager configuration has failed.
          dashboard_url: default_dashboard_url
      - alert: alertmanager-failed-reload-critical
        expr: '# Without max_over_time, failed scrapes could create false negatives, see

          # https://www.robustperception.io/alerting-on-gauges-in-prometheus-2-0 for details.

          max_over_time(alertmanager_config_last_reload_successful{job="kube-prometheus-stack-alertmanager",container="alertmanager",namespace="prometheus"}[5m]) == 0'
        for: 10m
        labels:
          severity: critical
          group_name: alertmanager-failed-reload
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Configuration has failed to load for {{ $labels.namespace }}/{{ $labels.pod}}. This critical
            alert fires after 10m.
          runbook_url: default_runbook_url
          summary: Reloading an Alertmanager configuration has failed.
          dashboard_url: default_dashboard_url
